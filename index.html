<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<title>ANNA Plotter v6.3-B</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0e17;
  --surface: #111827;
  --surface2: #1a2234;
  --border: #1e293b;
  --text: #e2e8f0;
  --text-dim: #64748b;
  --accent: #22d3ee;
  --accent-glow: rgba(34, 211, 238, 0.15);
  --red: #f43f5e;
  --green: #34d399;
  --orange: #fb923c;
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100dvh;
  overflow-x: hidden;
}
body::before {
  content:''; position:fixed; inset:0; pointer-events:none;
  background: radial-gradient(ellipse 80% 50% at 50% 0%, rgba(34,211,238,0.04), transparent),
              radial-gradient(ellipse 60% 40% at 80% 100%, rgba(244,63,94,0.03), transparent);
}
.app { position:relative; z-index:1; padding:12px; max-width:600px; margin:0 auto; }

/* Header */
.header { display:flex; align-items:center; justify-content:space-between; padding:8px 0 12px; }
.header-left { display:flex; align-items:center; gap:10px; }
.logo {
  width:32px; height:32px; border-radius:8px;
  background:linear-gradient(135deg, var(--accent), #818cf8);
  display:flex; align-items:center; justify-content:center;
  font-family:'JetBrains Mono',monospace; font-weight:700; font-size:13px; color:var(--bg);
}
.header-title { font-family:'JetBrains Mono',monospace; font-weight:600; font-size:15px; }
.header-title span { color:var(--text-dim); font-weight:400; font-size:11px; margin-left:6px; }

.status-pill {
  font-family:'JetBrains Mono',monospace; font-size:10px; font-weight:500;
  padding:4px 10px; border-radius:20px; white-space:nowrap; transition:all 0.3s;
  background:rgba(244,63,94,0.12); color:var(--red); border:1px solid rgba(244,63,94,0.2);
}
.status-pill.connected { background:rgba(52,211,153,0.12); color:var(--green); border-color:rgba(52,211,153,0.2); }
.status-pill.connecting { background:rgba(251,146,60,0.12); color:var(--orange); border-color:rgba(251,146,60,0.2); }

/* Connect button */
.connect-btn {
  width:100%; padding:14px; border:none; border-radius:12px;
  font-family:'DM Sans',sans-serif; font-weight:600; font-size:15px;
  cursor:pointer; transition:all 0.2s;
  background:linear-gradient(135deg, #22d3ee, #818cf8); color:var(--bg);
  box-shadow:0 4px 20px rgba(34,211,238,0.25);
}
.connect-btn:active { transform:scale(0.98); }
.connect-btn.stop { background:var(--surface2); color:var(--red); border:1px solid rgba(244,63,94,0.3); box-shadow:none; }
.connect-btn:disabled { opacity:0.5; cursor:not-allowed; transform:none; }

/* Stats */
.stats { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin:12px 0; }
.stat-card { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:10px; text-align:center; }
.stat-label { font-family:'JetBrains Mono',monospace; font-size:9px; text-transform:uppercase; letter-spacing:0.08em; color:var(--text-dim); margin-bottom:4px; }
.stat-value { font-family:'JetBrains Mono',monospace; font-size:16px; font-weight:600; }
.stat-value .u { font-size:10px; font-weight:400; color:var(--text-dim); margin-left:2px; }

/* Plot */
.plot-box {
  background:var(--surface); border:1px solid var(--border); border-radius:14px;
  padding:12px 8px 8px; margin:12px 0; position:relative; overflow:hidden;
}
.plot-box::before { content:''; position:absolute; top:0; left:0; right:0; height:1px; background:linear-gradient(90deg,transparent,var(--accent),transparent); opacity:0.4; }
.plot-hdr { display:flex; justify-content:space-between; align-items:center; padding:0 4px 8px; }
.plot-title { font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--text-dim); text-transform:uppercase; letter-spacing:0.08em; }
.live-dot { width:6px; height:6px; border-radius:50%; background:var(--red); display:inline-block; margin-right:6px; opacity:0; transition:opacity 0.3s; }
.live-dot.on { background:var(--green); opacity:1; animation:blink 1.2s ease-in-out infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
.plot-v { font-family:'JetBrains Mono',monospace; font-size:20px; font-weight:700; color:var(--accent); }
.plot-v .u { font-size:12px; font-weight:400; color:var(--text-dim); }
canvas { width:100%; height:260px; display:block; border-radius:8px; }

/* Controls */
.ctrls { display:flex; gap:8px; margin:12px 0; }
.cb {
  flex:1; padding:10px 8px; border:1px solid var(--border); border-radius:10px;
  background:var(--surface); color:var(--text-dim); font-family:'JetBrains Mono',monospace;
  font-size:11px; font-weight:500; cursor:pointer; transition:all 0.15s;
  display:flex; align-items:center; justify-content:center; gap:6px;
}
.cb:active { background:var(--surface2); color:var(--text); border-color:var(--accent); }
.cb svg { width:14px; height:14px; }

/* Time selector */
.tsel { display:flex; gap:4px; margin:8px 0; background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:4px; }
.topt {
  flex:1; padding:7px 0; border:none; border-radius:7px; background:transparent;
  color:var(--text-dim); font-family:'JetBrains Mono',monospace; font-size:11px; font-weight:500;
  cursor:pointer; transition:all 0.15s;
}
.topt.on { background:var(--accent-glow); color:var(--accent); border:1px solid rgba(34,211,238,0.2); }

/* Toggle */
.trow { display:flex; align-items:center; justify-content:space-between; padding:0 2px; margin:6px 0; }
.tlbl { font-family:'JetBrains Mono',monospace; font-size:10px; color:var(--text-dim); }
.tgl { width:36px; height:20px; border-radius:10px; background:var(--surface2); border:1px solid var(--border); position:relative; cursor:pointer; transition:all 0.2s; }
.tgl.on { background:rgba(34,211,238,0.2); border-color:var(--accent); }
.tgl::after { content:''; width:14px; height:14px; border-radius:50%; background:var(--text-dim); position:absolute; top:2px; left:2px; transition:all 0.2s; }
.tgl.on::after { left:18px; background:var(--accent); }

/* Diag */
.diag { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:12px; margin:12px 0; }
.diag-t { font-family:'JetBrains Mono',monospace; font-size:10px; text-transform:uppercase; letter-spacing:0.08em; color:var(--text-dim); margin-bottom:8px; }
.diag-g { display:grid; grid-template-columns:1fr 1fr; gap:6px; }
.di { display:flex; justify-content:space-between; align-items:center; padding:6px 8px; background:var(--surface2); border-radius:6px; }
.dk { font-family:'JetBrains Mono',monospace; font-size:10px; color:var(--text-dim); }
.dv { font-family:'JetBrains Mono',monospace; font-size:11px; font-weight:600; }

/* Toast */
.toast {
  position:fixed; bottom:24px; left:50%; transform:translateX(-50%);
  background:var(--surface2); color:var(--text);
  font-family:'JetBrains Mono',monospace; font-size:11px; padding:12px 20px;
  border-radius:12px; z-index:1000; max-width:90vw; text-align:center;
  opacity:0; pointer-events:none; transition:opacity 0.3s; box-shadow:0 8px 32px rgba(0,0,0,0.5);
  line-height:1.5; border:1px solid var(--accent);
}
.toast.show { opacity:1; pointer-events:auto; }
.toast.err { border-color:var(--red); }

/* Debug log */
.dlog {
  background:var(--surface); border:1px solid var(--border); border-radius:12px;
  padding:12px; margin:8px 0; max-height:180px; overflow-y:auto;
  font-family:'JetBrains Mono',monospace; font-size:10px; line-height:1.7; color:var(--text-dim);
}
.dlog .e { color:var(--red); }
.dlog .g { color:var(--green); }
.dlog .w { color:var(--orange); }

.footer { text-align:center; padding:16px 0 24px; font-family:'JetBrains Mono',monospace; font-size:9px; color:var(--text-dim); opacity:0.6; }
</style>
</head>
<body>

<div class="toast" id="toast"></div>

<div class="app">
  <div class="header">
    <div class="header-left">
      <div class="logo">A</div>
      <div class="header-title">ANNA Plotter <span>v6.3-B · Feb 23</span></div>
    </div>
    <div class="status-pill" id="pill">Disconnected</div>
  </div>

  <button class="connect-btn" id="btn">Connect to ANNA</button>

  <div class="stats">
    <div class="stat-card"><div class="stat-label">Rate</div><div class="stat-value" id="sRate">--<span class="u"> Hz</span></div></div>
    <div class="stat-card"><div class="stat-label">Packets</div><div class="stat-value" id="sPkt">0</div></div>
    <div class="stat-card"><div class="stat-label">Samples</div><div class="stat-value" id="sSmp">0</div></div>
  </div>

  <div class="plot-box">
    <div class="plot-hdr">
      <div><span class="live-dot" id="dot"></span><span class="plot-title">Voltage</span></div>
      <div class="plot-v" id="lv">--<span class="u"> V</span></div>
    </div>
    <canvas id="c"></canvas>
  </div>

  <div class="tsel" id="tsel">
    <button class="topt" data-s="5">5s</button>
    <button class="topt on" data-s="10">10s</button>
    <button class="topt" data-s="20">20s</button>
    <button class="topt" data-s="30">30s</button>
    <button class="topt" data-s="60">60s</button>
  </div>

  <div class="trow">
    <span class="tlbl">Auto-scale Y axis</span>
    <div class="tgl on" id="asc"></div>
  </div>

  <div class="ctrls">
    <button class="cb" id="bClr">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M8 6V4h8v2m-7 5v6m4-6v6M5 6l1 14h12l1-14"/></svg>
      Clear
    </button>
    <button class="cb" id="bSav">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4m4-5l5 5 5-5m-5 5V3"/></svg>
      Save CSV
    </button>
    <button class="cb" id="bRst">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 4v6h6M23 20v-6h-6"/><path d="M20.49 9A9 9 0 005.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 013.51 15"/></svg>
      Reset
    </button>
  </div>

  <div class="diag">
    <div class="diag-t">BLE Diagnostics</div>
    <div class="diag-g">
      <div class="di"><span class="dk">Interval</span><span class="dv" id="dCI">--</span></div>
      <div class="di"><span class="dk">MTU</span><span class="dv" id="dMTU">--</span></div>
      <div class="di"><span class="dk">Slave Lat</span><span class="dv" id="dSL">--</span></div>
      <div class="di"><span class="dk">Eff. Rate</span><span class="dv" id="dEff">--</span></div>
    </div>
  </div>

  <div class="dlog" id="log"></div>

  <div class="footer">Copyright &copy; 2024 Robert Ccorahua-Santo · Build v6.3-B</div>
</div>

<script>
/* ===========================================================
   IMMEDIATE TEST — if you see "JS OK" in the log, script runs
   =========================================================== */
(function(){
  var el = document.getElementById('log');
  el.innerHTML = '<div class="g">[boot] JS loaded — v6.3-B Feb23</div>';
})();

/* ===========================================================
   CONFIG — ANNA B112 firmware v6
   =========================================================== */
var SVC  = 'cddf1000-30f7-4671-8b43-5e40ba53514a';
var VCHAR = 'cddf1002-30f7-4671-8b43-5e40ba53514a';
var DCHAR = 'cddf1003-30f7-4671-8b43-5e40ba53514a';
var SPP  = 10;       // samples per packet
var SDT  = 0.008;    // 8 ms
var FSZ  = 44;       // frame size

/* ===========================================================
   HELPERS
   =========================================================== */
function L(m, c) {
  c = c || '';
  console.log('[ANNA] ' + m);
  var el = document.getElementById('log');
  var d = document.createElement('div');
  if (c) d.className = c;
  d.textContent = '[' + new Date().toLocaleTimeString('en-US',{hour12:false}) + '] ' + m;
  el.appendChild(d);
  el.scrollTop = 99999;
}

var _tt = 0;
function toast(m, ms, err) {
  var t = document.getElementById('toast');
  t.textContent = m;
  t.className = 'toast show' + (err ? ' err' : '');
  clearTimeout(_tt);
  _tt = setTimeout(function(){ t.className = 'toast'; }, ms || 4000);
}

/* ===========================================================
   STATE
   =========================================================== */
var dev = null, srv = null, vch = null, dch = null;
var on = false;
var xD = [], yD = [];
var MX = 20000;
var rx = new Uint8Array(0);
var nPkt = 0, nSmp = 0;
var rT = { n: 0, t: performance.now(), r: 0 };
var tWin = 10;
var af = null;

/* ===========================================================
   BOOT CHECKS
   =========================================================== */
L('URL: ' + location.href);
L('Secure: ' + !!window.isSecureContext, window.isSecureContext ? 'g' : 'e');
L('BLE API: ' + !!navigator.bluetooth, navigator.bluetooth ? 'g' : 'e');

if (!window.isSecureContext) {
  L('ERROR: Page not served over HTTPS!', 'e');
  toast('Needs HTTPS! Use GitHub Pages URL, not raw github.com', 10000, true);
}
if (!navigator.bluetooth) {
  L('ERROR: navigator.bluetooth missing', 'e');
  toast('Web Bluetooth not available in this browser', 10000, true);
}

/* ===========================================================
   TIME WINDOW
   =========================================================== */
document.getElementById('tsel').addEventListener('click', function(e) {
  var b = e.target;
  if (!b.classList.contains('topt')) return;
  var all = document.querySelectorAll('.topt');
  for (var i = 0; i < all.length; i++) all[i].classList.remove('on');
  b.classList.add('on');
  tWin = parseInt(b.getAttribute('data-s'));
});

/* ===========================================================
   AUTOSCALE TOGGLE
   =========================================================== */
document.getElementById('asc').addEventListener('click', function() {
  this.classList.toggle('on');
});

/* ===========================================================
   CONNECT / DISCONNECT
   =========================================================== */
document.getElementById('btn').addEventListener('click', function() {
  L('Button tapped', 'g');

  if (on) {
    on = false;
    try { if (dev && dev.gatt.connected) dev.gatt.disconnect(); } catch(e){}
    setUI(false);
    return;
  }

  if (!navigator.bluetooth) {
    toast('No Web Bluetooth. Use Chrome + HTTPS.', 5000, true);
    L('Abort: no BLE API', 'e');
    return;
  }

  var btn = document.getElementById('btn');
  var pill = document.getElementById('pill');
  btn.disabled = true;
  btn.textContent = 'Scanning...';
  pill.textContent = 'Scanning';
  pill.className = 'status-pill connecting';
  L('requestDevice...');

  navigator.bluetooth.requestDevice({
    filters: [{ services: [SVC] }]
  })
  .then(function(d) {
    dev = d;
    L('Got device: ' + (d.name || d.id), 'g');
    d.addEventListener('gattserverdisconnected', function(){ setUI(false); });
    pill.textContent = 'Connecting';
    btn.textContent = 'Connecting...';
    L('GATT connect...');
    return d.gatt.connect();
  })
  .then(function(s) {
    srv = s;
    L('GATT OK', 'g');
    return s.getPrimaryService(SVC);
  })
  .then(function(svc) {
    L('Service OK', 'g');
    return svc.getCharacteristic(VCHAR).then(function(ch) {
      vch = ch;
      L('Voltage char OK', 'g');
      return ch.startNotifications().then(function() {
        ch.addEventListener('characteristicvaluechanged', onV);
        L('Voltage notify ON', 'g');
        return svc;
      });
    });
  })
  .then(function(svc) {
    return svc.getCharacteristic(DCHAR).then(function(ch) {
      dch = ch;
      return ch.startNotifications().then(function() {
        ch.addEventListener('characteristicvaluechanged', onD);
        L('Diag notify ON', 'g');
        setTimeout(function(){
          try { dch.readValue().then(parseD).catch(function(){}); } catch(e){}
        }, 6000);
      });
    }).catch(function(e) {
      L('Diag skip: ' + e.message, 'w');
    });
  })
  .then(function() {
    on = true;
    setUI(true);
    toast('Connected to ' + (dev.name || 'device'), 2000);
    nPkt = 0; nSmp = 0;
    rT = { n: 0, t: performance.now(), r: 0 };
    rx = new Uint8Array(0);
    startLoop();
  })
  .catch(function(err) {
    L('FAIL: ' + err.name + ' — ' + err.message, 'e');
    if (err.name === 'NotFoundError')
      toast('Cancelled or no device found. Is ANNA on?', 5000, true);
    else if (err.name === 'SecurityError')
      toast('SecurityError — needs HTTPS', 5000, true);
    else if (err.name === 'NetworkError')
      toast('Connection failed. ANNA in range?', 5000, true);
    else
      toast(err.message, 5000, true);

    btn.disabled = false;
    btn.textContent = 'Connect to ANNA';
    btn.className = 'connect-btn';
    pill.textContent = 'Failed';
    pill.className = 'status-pill';
  });
});

function setUI(connected) {
  var btn = document.getElementById('btn');
  var pill = document.getElementById('pill');
  var dot = document.getElementById('dot');
  if (connected) {
    btn.disabled = false;
    btn.textContent = 'Disconnect';
    btn.className = 'connect-btn stop';
    pill.textContent = 'Connected';
    pill.className = 'status-pill connected';
    dot.classList.add('on');
  } else {
    on = false;
    btn.disabled = false;
    btn.textContent = 'Connect to ANNA';
    btn.className = 'connect-btn';
    pill.textContent = 'Disconnected';
    pill.className = 'status-pill';
    dot.classList.remove('on');
    if (af) { cancelAnimationFrame(af); af = null; }
    L('Disconnected');
  }
}

/* ===========================================================
   BLE DATA — v6 44-byte frames
   =========================================================== */
function onV(ev) {
  var inc = new Uint8Array(ev.target.value.buffer);
  var tmp = new Uint8Array(rx.length + inc.length);
  tmp.set(rx); tmp.set(inc, rx.length); rx = tmp;

  while (rx.length >= FSZ) {
    var fr = rx.slice(0, FSZ);
    rx = rx.slice(FSZ);
    var dv = new DataView(fr.buffer);
    var t0 = dv.getFloat32(0, true);
    for (var i = 0; i < SPP; i++) {
      xD.push(t0 + i * SDT);
      yD.push(dv.getFloat32(4 + i * 4, true));
      nSmp++;
    }
    nPkt++;
  }
  if (xD.length > MX) { var ex = xD.length - MX; xD.splice(0, ex); yD.splice(0, ex); }
}

/* ===========================================================
   DIAGNOSTIC
   =========================================================== */
function onD(ev) { parseD(ev.target.value); }
function parseD(dv) {
  if (dv.byteLength < 6) return;
  var ci = dv.getUint16(0, true);
  var mtu = dv.getUint16(2, true);
  var cx10 = dv.getUint16(4, true);
  var ms = cx10 / 10;
  var sl = dv.byteLength >= 8 ? dv.getUint16(6, true) : 0;
  var eff = ms * (1 + sl);
  document.getElementById('dCI').textContent = ms.toFixed(1) + ' ms';
  document.getElementById('dMTU').textContent = mtu;
  document.getElementById('dSL').textContent = sl;
  document.getElementById('dEff').textContent = eff.toFixed(0) + ' ms';
  document.getElementById('dCI').style.color = sl > 0 ? (eff >= 50 ? 'var(--green)' : 'var(--orange)') : (ci >= 60 ? 'var(--green)' : 'var(--red)');
  L('Diag CI=' + ms + 'ms MTU=' + mtu + ' SL=' + sl, 'g');
}

/* ===========================================================
   CANVAS
   =========================================================== */
var cv = document.getElementById('c');
var cx = cv.getContext('2d');

function rsz() {
  var r = cv.parentElement.getBoundingClientRect();
  var d = window.devicePixelRatio || 1;
  cv.width = (r.width - 16) * d;
  cv.height = 260 * d;
  cv.style.width = (r.width - 16) + 'px';
  cv.style.height = '260px';
  cx.setTransform(d, 0, 0, d, 0, 0);
}
rsz();
window.addEventListener('resize', rs
